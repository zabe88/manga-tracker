<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Tracker - Inventario Libreria</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=DM+Sans:wght@400;500;700&display=swap');
:root{--bg:#0f0f13;--card:#1a1a24;--border:#2a2a3a;--text:#e8e8f0;--dim:#888899;--accent:#ff6b6b;--green:#4ecdc4;--yellow:#ffe66d;--blue:#6c8cff;--purple:#a78bfa;--orange:#fb923c;--owned:#2d4a3e;--missing:#4a2d2d;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
.app{max-width:1400px;margin:0 auto;padding:16px}

/* HEADER */
.header{display:flex;align-items:center;gap:16px;padding:20px 0;border-bottom:2px solid var(--accent);margin-bottom:16px;flex-wrap:wrap}
.header h1{font-family:'Noto Sans JP',sans-serif;font-weight:900;font-size:26px;background:linear-gradient(135deg,var(--accent),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pill{font-size:11px;padding:3px 10px;border-radius:12px;display:inline-flex;align-items:center;gap:4px}
.pill.ok{background:#2d4a3e;color:var(--green)}.pill.warn{background:#4a3a2d;color:var(--yellow)}
.stats{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:6px 12px;text-align:center;font-size:11px}
.stat .n{font-size:17px;font-weight:700}.n.g{color:var(--green)}.n.r{color:var(--accent)}.n.b{color:var(--blue)}

/* BACKUP BAR */
.backup-bar{background:linear-gradient(135deg,#1a2a1a,#1a1a24);border:1px solid #2a4a2a;border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.backup-bar .icon{font-size:20px}
.backup-bar .info{flex:1;font-size:12px;color:var(--dim);min-width:200px}
.backup-bar .info strong{color:var(--green);font-size:13px;display:block}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar input,.toolbar select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--r);font-size:13px;font-family:inherit;outline:none}
.toolbar input:focus,.toolbar select:focus{border-color:var(--accent)}.toolbar input{flex:1;min-width:180px}

/* BUTTONS */
.btn{border:none;padding:8px 14px;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn-a{background:var(--accent);color:#fff}.btn-b{background:var(--blue);color:#fff}
.btn-grn{background:var(--green);color:#000}.btn-s{padding:5px 10px;font-size:11px}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--dim)}.btn-g:hover{border-color:var(--accent);color:var(--accent)}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:inherit}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

.bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.legend{display:flex;gap:14px;margin:8px 0 12px;font-size:11px;color:var(--dim);flex-wrap:wrap}
.dot{width:11px;height:11px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:3px}
.dg{background:var(--owned);border:1px solid #3a6a5a}.dr{background:var(--missing);border:1px solid #6a3a3a}

/* SERIES LIST */
.series-list{display:flex;flex-direction:column;gap:6px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border .2s}
.sc:hover{border-color:#444}.sc.exp{border-color:var(--blue)}
.sh{display:grid;grid-template-columns:1fr auto auto auto auto auto;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
@media(max-width:768px){.sh{grid-template-columns:1fr auto auto}.sh .ed,.sh .pr,.sh .pz{display:none}}
.sn{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px}
.badge{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;text-transform:uppercase}
.badge.c{background:var(--green);color:#000}.badge.i{background:var(--orange);color:#000}.badge.st{background:var(--purple);color:#000}
.ed{color:var(--dim);font-size:12px}.pr{color:var(--yellow);font-size:12px;font-weight:600}.pz{color:var(--dim);font-size:12px}
.pb{width:110px;height:7px;background:var(--missing);border-radius:4px;overflow:hidden}
.pb .f{height:100%;border-radius:4px;transition:width .3s}.f.fg{background:var(--green)}.f.fy{background:var(--yellow)}.f.fr{background:var(--accent)}
.vc{font-size:12px;font-weight:600;min-width:60px;text-align:right}

/* DETAIL */
.sd{padding:0 14px 14px;border-top:1px solid var(--border)}
.vg{display:flex;flex-wrap:wrap;gap:3px;margin:10px 0}
.vl{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;transition:all .12s;border:1px solid transparent}
.vl.o{background:var(--owned);color:var(--green);border-color:#3a6a5a}.vl.m{background:var(--missing);color:var(--accent);border-color:#6a3a3a}
.vl:hover{transform:scale(1.15);z-index:1}.vl.o:hover{background:var(--missing);color:var(--accent)}.vl.m:hover{background:var(--owned);color:var(--green)}
.da{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px}
.da label{font-size:11px;color:var(--dim)}
.da input[type="number"]{width:65px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 7px;border-radius:6px;font-size:12px;font-family:inherit}
.si{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.empty{text-align:center;padding:50px;color:var(--dim)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.md{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;max-width:480px;width:100%}
.md h3{margin-bottom:14px;font-size:17px}
.fd{margin-bottom:10px}.fd label{display:block;font-size:12px;color:var(--dim);margin-bottom:3px}
.fd input,.fd select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px;border-radius:6px;font-size:13px;font-family:inherit}
.mb{display:flex;gap:8px;margin-top:14px}
input[type="file"]{display:none}
</style>
</head>

T PRINCESS. THE LEGEND OF ZELDA.","g":1,"p":5.9},{"t":"TWILIGHT PRINCESS. THE LEGEND OF ZELDA.","g":1,"p":5.9},{"t":"TWILIGHT PRINCESS. THE LEGEND OF ZELDA.","g":1,"p":5.9},{"t":"TWILIGHT PRINCESS. THE LEGEND OF ZELDA.","g":1,"p":5.9},{"t":"TWILIGHT PRINCESS. THE LEGEND OF ZELDA.","g":1,"p":5.9},{"t":"TWILIGHT PRINCESS. THE LEGEND OF ZELDA.","g":1,"p":5.9},{"t":"TWILIGHT PRINCESS. THE LEGEND OF ZELDA.","g":1,"p":5.9}]},{"n":"ULTRA GOD MISSION!!!! SUPER DRAGON BALL","e":"STAR COMICS","h":[],"m":[],"mx":0,"tu":0,"p":5.5,"tp":5,"s":false,"st":[{"t":"ULTRA GOD MISSION!!!! SUPER DRAGON BALL","g":3,"p":5.5},{"t":"ULTRA GOD MISSION!!!! SUPER DRAGON BALL","g":2,"p":5.5}]},{"n":"UNIVERSE MISSION!! SUPER DRAGON BALL HER","e":"STAR COMICS","h":[],"m":[],"mx":0,"tu":0,"p":5.0,"tp":4,"s":false,"st":[{"t":"UNIVERSE MISSION!! SUPER DRAGON BALL HER","g":2,"p":4.5},{"t":"UNIVERSE MISSION!! SUPER DRAGON BALL HER","g":2,"p":5.5}]},{"n":"VIA DEL GREMBIULE. LO YAKUZA CASALINGO (","e":"EDIZIONI BD","h":[],"m":[],"mx":0,"tu":0,"p":5.9,"tp":1,"s":false,"st":[{"t":"VIA DEL GREMBIULE. LO YAKUZA CASALINGO (","g":1,"p":5.9}]},{"n":"VIGILANTE. MY HERO ACADEMIA ILLEGALS. VO","e":"STAR COMICS","h":[],"m":[],"mx":0,"tu":0,"p":5.2,"tp":6,"s":false,"st":[{"t":"VIGILANTE. MY HERO ACADEMIA ILLEGALS. VO","g":1,"p":5.2},{"t":"VIGILANTE. MY HERO ACADEMIA ILLEGALS. VO","g":1,"p":5.2},{"t":"VIGILANTE. MY HERO ACADEMIA ILLEGALS. VO","g":1,"p":5.2},{"t":"VIGILANTE. MY HERO ACADEMIA ILLEGALS. VO","g":1,"p":5.2},{"t":"VIGILANTE. MY HERO ACADEMIA ILLEGALS. VO","g":2,"p":5.2}]},{"n":"WORLD HEROES' MISSION. MY HERO ACADEMIA","e":"STAR COMICS","h":[],"m":[],"mx":0,"tu":0,"p":12.9,"tp":2,"s":false,"st":[{"t":"WORLD HEROES' MISSION. MY HERO ACADEMIA.","g":2,"p":12.9}]}];

const STORAGE_KEY='mt_data_v3';
const STORAGE_TS='mt_saved_at';

/* ── HELPERS ── */
function prep(){return INIT.map((d,i)=>({...d,id:i,ut:d.tu||d.mx}))}
function gm(h,mx){const m=[];for(let i=1;i<=mx;i++)if(!h.includes(i))m.push(i);return m}

/* ── APP ── */
function App(){
  const [data,setData]=useState(()=>{
    try{const s=localStorage.getItem(STORAGE_KEY);if(s){const p=JSON.parse(s);if(Array.isArray(p)&&p.length>0)return p}}catch(e){}
    return prep();
  });
  const [savedAt,setSavedAt]=useState(()=>localStorage.getItem(STORAGE_TS)||null);
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('all');
  const [edFilt,setEdFilt]=useState('all');
  const [expanded,setExpanded]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [sortBy,setSortBy]=useState('name');
  const fileRef=useRef(null);

  // SAVE to localStorage on every change
  useEffect(()=>{
    try{
      localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
      const ts=new Date().toLocaleString('it-IT');
      localStorage.setItem(STORAGE_TS,ts);
      setSavedAt(ts);
    }catch(e){console.error('Save error',e)}
  },[data]);

  // BACKUP: download JSON
  function downloadBackup(){
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const d=new Date().toISOString().slice(0,10);
    a.href=url;a.download=`manga_backup_${d}.json`;a.click();
    URL.revokeObjectURL(url);
  }

  // RESTORE: load JSON
  function handleFileUpload(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const imported=JSON.parse(ev.target.result);
        if(Array.isArray(imported)&&imported.length>0){
          if(confirm(`Trovate ${imported.length} serie nel backup. Sostituire i dati attuali?`)){
            setData(imported);setExpanded(null);
            alert('Dati ripristinati con successo!');
          }
        }else{alert('File non valido.')}
      }catch(err){alert('Errore nella lettura del file: '+err.message)}
    };
    reader.readAsText(file);
    e.target.value='';
  }

  // EXPORT CSV
  function exportCSV(){
    let csv='\uFEFFSerie,Editore,Volumi Posseduti,Volumi Mancanti,Tot Usciti,Pezzi,Prezzo Medio\n';
    data.forEach(d=>{
      const miss=d.s?gm(d.h,d.ut||d.mx):[];
      csv+=`"${d.n}","${d.e}","${d.h.join(';')}","${miss.join(';')}",${d.ut||d.mx},${d.tp},${d.p}\n`;
    });
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='manga_inventario.csv';a.click();
  }

  function resetData(){
    if(confirm('⚠️ Ripristinare i dati ORIGINALI dall\'inventario?\nPerderai TUTTE le modifiche fatte!\n\n(Consiglio: scarica prima un backup)')){
      setData(prep());setExpanded(null);
    }
  }

  // STATS
  const stats=useMemo(()=>{
    let ow=0,mi=0,pz=0;
    data.forEach(d=>{if(d.s){ow+=d.h.length;const mx=d.ut||d.mx;for(let i=1;i<=mx;i++)if(!d.h.includes(i))mi++}pz+=d.tp});
    return{t:data.length,ow,mi,pz};
  },[data]);

  const editori=useMemo(()=>{
    const m={};data.forEach(d=>{m[d.e]=(m[d.e]||0)+1});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[data]);

  const counts=useMemo(()=>{
    let ser=0,sta=0,comp=0,inc=0;
    data.forEach(d=>{
      if(d.s){ser++;const mx=d.ut||d.mx;let ok=true;for(let i=1;i<=mx;i++)if(!d.h.includes(i)){ok=false;break}
        if(ok&&d.h.length>=mx)comp++;else inc++}else sta++});
    return{ser,sta,comp,inc};
  },[data]);

  // FILTER + SORT
  const filtered=useMemo(()=>{
    let list=[...data];
    if(search){const q=search.toLowerCase();list=list.filter(d=>d.n.toLowerCase().includes(q)||d.e.toLowerCase().includes(q))}
    if(edFilt!=='all')list=list.filter(d=>d.e===edFilt);
    if(filter==='series')list=list.filter(d=>d.s);
    else if(filter==='standalone')list=list.filter(d=>!d.s);
    else if(filter==='complete')list=list.filter(d=>{if(!d.s)return false;const mx=d.ut||d.mx;for(let i=1;i<=mx;i++)if(!d.h.includes(i))return false;return d.h.length>=mx});
    else if(filter==='incomplete')list=list.filter(d=>{if(!d.s)return false;const mx=d.ut||d.mx;for(let i=1;i<=mx;i++)if(!d.h.includes(i))return true;return false});
    if(sortBy==='name')list.sort((a,b)=>a.n.localeCompare(b.n));
    else if(sortBy==='vols')list.sort((a,b)=>b.h.length-a.h.length);
    else if(sortBy==='missing')list.sort((a,b)=>(d=>d.s?gm(d.h,d.ut||d.mx).length:0)(b)-(d=>d.s?gm(d.h,d.ut||d.mx).length:0)(a));
    else if(sortBy==='pezzi')list.sort((a,b)=>b.tp-a.tp);
    return list;
  },[data,search,filter,edFilt,sortBy]);

  function toggleVol(id,v){
    setData(p=>p.map(d=>{if(d.id!==id)return d;const has=d.h.includes(v);
      const nh=has?d.h.filter(x=>x!==v):[...d.h,v].sort((a,b)=>a-b);
      return{...d,h:nh,m:gm(nh,d.ut||d.mx),tp:d.tp+(has?-1:1)}}))
  }

  function updateMax(id,v){
    setData(p=>p.map(d=>{if(d.id!==id)return d;const nm=parseInt(v)||d.mx;
      return{...d,ut:nm,mx:Math.max(d.mx,nm),m:gm(d.h,nm)}}))
  }

  function addSeries(ns){
    const id=data.length?Math.max(...data.map(d=>d.id))+1:0;
    setData(p=>[...p,{...ns,id,m:gm(ns.h,ns.ut),vd:[],tp:ns.s?ns.h.length:1}]);
    setShowAdd(false);
  }

  function delSeries(id){if(confirm('Eliminare?')){setData(p=>p.filter(d=>d.id!==id));setExpanded(null)}}

  return(
    <div className="app">
      <div className="header">
        <h1>漫画 Manga Tracker</h1>
        <span className="pill ok">✓ Salvato{savedAt&&` · ${savedAt}`}</span>
        <div className="stats">
          <div className="stat"><div className="n b">{stats.t}</div>Titoli</div>
          <div className="stat"><div className="n g">{stats.ow}</div>Volumi</div>
          <div className="stat"><div className="n r">{stats.mi}</div>Mancanti</div>
          <div className="stat"><div className="n">{stats.pz}</div>Pezzi</div>
        </div>
      </div>

      {/* BACKUP BAR */}
      <div className="backup-bar">
        <div className="icon">💾</div>
        <div className="info">
          <strong>I dati si salvano automaticamente nel browser</strong>
          Scarica un backup JSON periodicamente per sicurezza. Puoi ripristinarlo in qualsiasi momento.
        </div>
        <button className="btn btn-grn" onClick={downloadBackup}>⬇ Scarica backup</button>
        <button className="btn btn-b" onClick={()=>fileRef.current.click()}>⬆ Carica backup</button>
        <input ref={fileRef} type="file" accept=".json" onChange={handleFileUpload}/>
      </div>

      <div className="toolbar">
        <input placeholder="🔍 Cerca serie o editore..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select value={edFilt} onChange={e=>setEdFilt(e.target.value)}>
          <option value="all">Tutti gli editori</option>
          {editori.map(([ed,c])=><option key={ed} value={ed}>{ed} ({c})</option>)}
        </select>
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="name">Nome</option><option value="vols">Volumi</option>
          <option value="missing">Mancanti</option><option value="pezzi">Pezzi</option>
        </select>
      </div>

      <div className="filters">
        {[['all',`Tutti (${stats.t})`],['series',`Serie (${counts.ser})`],['standalone',`Standalone (${counts.sta})`],['complete',`Complete (${counts.comp})`],['incomplete',`Incomplete (${counts.inc})`]].map(([k,l])=>
          <button key={k} className={`chip${filter===k?' on':''}`} onClick={()=>setFilter(k)}>{l}</button>)}
      </div>

      <div className="bar">
        <button className="btn btn-s btn-a" onClick={()=>setShowAdd(true)}>+ Aggiungi serie</button>
        <button className="btn btn-s btn-g" onClick={exportCSV}>📊 Esporta CSV</button>
        <button className="btn btn-s btn-g" onClick={resetData}>🔄 Reset originale</button>
      </div>

      <div className="legend">
        <span><span className="dot dg"></span>Posseduto</span>
        <span><span className="dot dr"></span>Mancante</span>
        <span>Clicca un volume per cambiare stato</span>
      </div>

      <div className="series-list">
        {filtered.length===0&&<div className="empty">Nessun risultato</div>}
        {filtered.map(d=>{
          const miss=d.s?gm(d.h,d.ut||d.mx):[];
          const mx=d.ut||d.mx;
          const pct=d.s&&mx>0?Math.round(d.h.length/mx*100):100;
          const isE=expanded===d.id;
          const isCo=d.s&&miss.length===0&&d.h.length>=mx;
          return(
            <div key={d.id} className={`sc${isE?' exp':''}`}>
              <div className="sh" onClick={()=>setExpanded(isE?null:d.id)}>
                <div className="sn">{d.n}{d.s?(isCo?<span className="badge c">OK</span>:<span className="badge i">{miss.length}</span>):<span className="badge st">1 vol</span>}</div>
                <div className="ed">{d.e}</div>
                <div className="pr">€{d.p.toFixed(2)}</div>
                <div className="pz">{d.tp}pz</div>
                {d.s?<div className="pb"><div className={`f ${pct>=80?'fg':pct>=40?'fy':'fr'}`} style={{width:`${pct}%`}}></div></div>:<div style={{width:110}}></div>}
                <div className="vc">{d.s?`${d.h.length}/${mx}`:'—'}</div>
              </div>
              {isE&&<div className="sd">
                {d.s?<>
                  <div className="vg">
                    {Array.from({length:mx},(_,i)=>i+1).map(v=>
                      <div key={v} className={`vl ${d.h.includes(v)?'o':'m'}`}
                        onClick={e=>{e.stopPropagation();toggleVol(d.id,v)}}
                        title={`Vol.${v} - ${d.h.includes(v)?'posseduto':'mancante'}`}>{v}</div>)}
                  </div>
                  <div className="da">
                    <label>Tot. usciti:</label>
                    <input type="number" value={mx} min={1} onClick={e=>e.stopPropagation()}
                      onChange={e=>{e.stopPropagation();updateMax(d.id,e.target.value)}}/>
                    <button className="btn btn-s btn-g" onClick={e=>{e.stopPropagation();delSeries(d.id)}}>Elimina</button>
                    {miss.length>0&&<span style={{fontSize:11,color:'var(--accent)'}}>Mancanti: {miss.slice(0,30).join(', ')}{miss.length>30?` (+${miss.length-30})`:''}</span>}
                  </div>
                </>:<div>
                  {(d.st||[]).map((s,i)=><div key={i} className="si"><span>{s.t}</span><span style={{color:'var(--yellow)'}}>€{s.p.toFixed(2)}×{s.g}</span></div>)}
                  <div className="da" style={{marginTop:6}}><button className="btn btn-s btn-g" onClick={e=>{e.stopPropagation();delSeries(d.id)}}>Elimina</button></div>
                </div>}
              </div>}
            </div>)
        })}
      </div>

      {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={addSeries}/>}
    </div>
  );
}

function AddModal({onClose,onAdd}){
  const[n,sN]=useState('');const[e,sE]=useState('');const[iS,sIS]=useState(true);
  const[tv,sTV]=useState(1);const[ow,sOW]=useState('');const[pr,sPR]=useState(5.9);
  function go(){if(!n.trim())return;
    const h=ow.split(/[,;\s]+/).map(Number).filter(x=>x>0).sort((a,b)=>a-b);
    onAdd({n:n.toUpperCase(),e:e.toUpperCase()||'N/A',h:iS?h:[],mx:iS?(parseInt(tv)||1):0,
      tu:iS?(parseInt(tv)||1):0,ut:iS?(parseInt(tv)||1):0,p:parseFloat(pr)||0,
      tp:iS?h.length:1,s:iS,st:iS?[]:[{t:n.toUpperCase(),g:1,p:parseFloat(pr)||0}]})}
  return(
    <div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()}>
      <h3>Aggiungi nuova serie</h3>
      <div className="fd"><label>Nome</label><input value={n} onChange={e=>sN(e.target.value)} placeholder="es. KAGURABACHI"/></div>
      <div className="fd"><label>Editore</label><input value={e} onChange={e=>sE(e.target.value)} placeholder="es. STAR COMICS"/></div>
      <div className="fd"><label>Tipo</label><select value={iS?'s':'t'} onChange={e=>sIS(e.target.value==='s')}><option value="s">Serie con volumi</option><option value="t">Titolo singolo</option></select></div>
      {iS&&<><div className="fd"><label>Totale volumi usciti</label><input type="number" value={tv} onChange={e=>sTV(e.target.value)} min={1}/></div>
      <div className="fd"><label>Volumi posseduti (virgola)</label><input value={ow} onChange={e=>sOW(e.target.value)} placeholder="1,2,3,5,7"/></div></>}
      <div className="fd"><label>Prezzo medio €</label><input type="number" value={pr} onChange={e=>sPR(e.target.value)} step={0.1}/></div>
      <div className="mb"><button className="btn btn-a" onClick={go}>Aggiungi</button><button className="btn btn-g" onClick={onClose}>Annulla</button></div>
    </div></div>)
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
