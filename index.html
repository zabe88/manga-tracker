<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap');
:root{--bg:#0f0f13;--card:#1a1a24;--brd:#2a2a3a;--txt:#e8e8f0;--dim:#888899;--acc:#ff6b6b;--grn:#4ecdc4;--yel:#ffe66d;--blu:#6c8cff;--pur:#a78bfa;--org:#fb923c;--own:#2d4a3e;--mis:#4a2d2d;--r:10px;--hot:#ff4757}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;padding-bottom:70px}
.app{max-width:1200px;margin:0 auto;padding:12px}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--brd);display:flex;z-index:50;padding:4px 0;padding-bottom:env(safe-area-inset-bottom,4px)}
.bnav button{flex:1;background:none;border:none;color:var(--dim);font-size:10px;font-family:inherit;padding:6px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .2s;position:relative}
.bnav button.on{color:var(--acc)}
.bnav button .ico{font-size:20px;line-height:1}
.bnav .badge-n{position:absolute;top:2px;right:calc(50% - 18px);background:var(--acc);color:#fff;font-size:8px;padding:1px 5px;border-radius:8px;font-weight:700}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:2px solid var(--acc);margin-bottom:12px;flex-wrap:wrap}
.hdr h1{font-family:'Noto Sans JP',sans-serif;font-weight:900;font-size:22px;background:linear-gradient(135deg,var(--acc),var(--yel));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pill{font-size:10px;padding:2px 8px;border-radius:10px;background:#2d4a3e;color:var(--grn)}
.sts{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.st{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:4px 10px;text-align:center;font-size:10px}
.st .n{font-size:16px;font-weight:700}.n.g{color:var(--grn)}.n.r{color:var(--acc)}.n.b{color:var(--blu)}

/* Shared */
.bbar{background:linear-gradient(135deg,#1a2a1a,#1a1a24);border:1px solid #2a4a2a;border-radius:var(--r);padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bbar .inf{flex:1;font-size:11px;color:var(--dim);min-width:140px}.bbar .inf strong{color:var(--grn);display:block}
.tb{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.tb input,.tb select{background:var(--card);border:1px solid var(--brd);color:var(--txt);padding:8px 10px;border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;min-width:0}
.tb input{flex:1;min-width:120px}.tb select{max-width:180px}
.btn{border:none;padding:7px 12px;border-radius:var(--r);cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;white-space:nowrap;transition:all .15s}
.btn:active{transform:scale(.96)}.ba{background:var(--acc);color:#fff}.bb{background:var(--blu);color:#fff}
.bg{background:transparent;border:1px solid var(--brd);color:var(--dim)}.bgrn{background:var(--grn);color:#000}.bs{padding:5px 9px;font-size:10px}
.bpur{background:var(--pur);color:#000}
.flt{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px}.flt::-webkit-scrollbar{display:none}
.ch{padding:5px 10px;border-radius:16px;font-size:11px;cursor:pointer;border:1px solid var(--brd);background:transparent;color:var(--dim);font-family:inherit;white-space:nowrap;flex-shrink:0}.ch.on{background:var(--acc);border-color:var(--acc);color:#fff}
.leg{display:flex;gap:10px;margin:6px 0 10px;font-size:10px;color:var(--dim);flex-wrap:wrap}
.dt{width:10px;height:10px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:2px}.dg{background:var(--own);border:1px solid #3a6a5a}.dr{background:var(--mis);border:1px solid #6a3a3a}
.emp{text-align:center;padding:40px;color:var(--dim)}

/* Cards */
.sl{display:flex;flex-direction:column;gap:6px}
.sc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden}.sc.ex{border-color:var(--blu)}
.sh{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;min-height:50px}
.cv{width:42px;height:58px;border-radius:4px;object-fit:cover;background:var(--brd);flex-shrink:0}
.cv-ph{width:42px;height:58px;border-radius:4px;background:linear-gradient(135deg,#2a2a3a,#1a1a24);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--dim);flex-shrink:0}
.sh-info{flex:1;min-width:0;overflow:hidden}
.sn{font-weight:700;font-size:13px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.sn-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.bdg{font-size:8px;padding:2px 6px;border-radius:6px;font-weight:700;text-transform:uppercase;flex-shrink:0}
.bdg.c{background:var(--grn);color:#000}.bdg.i{background:var(--org);color:#000}.bdg.sa{background:var(--pur);color:#000}
.sh-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pb{width:60px;height:6px;background:var(--mis);border-radius:3px;overflow:hidden;flex-shrink:0}
.pb .f{height:100%;border-radius:3px}.fg{background:var(--grn)}.fy{background:var(--yel)}.fr{background:var(--acc)}
.vc{font-size:11px;font-weight:600;min-width:42px;text-align:right;flex-shrink:0}
.fav-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:2px;line-height:1;flex-shrink:0}

/* Detail */
.sd{padding:8px 10px 12px;border-top:1px solid var(--brd)}
.sd-ed{font-size:11px;color:var(--dim);margin-bottom:8px}
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:4px;margin:8px 0}
.vl{display:flex;flex-direction:column;align-items:center;border-radius:6px;cursor:pointer;border:2px solid transparent;padding:3px;position:relative}
.vl.o{background:var(--own);border-color:#3a6a5a}.vl.m{background:var(--mis);border-color:#5a2d2d}
.vl:active{transform:scale(.92)}
.vl-img{width:100%;aspect-ratio:2/3;border-radius:3px;object-fit:cover;background:var(--brd)}
.vl-ph{width:100%;aspect-ratio:2/3;border-radius:3px;background:linear-gradient(135deg,#333,#222);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--dim)}
.vl-num{font-size:10px;font-weight:700;margin-top:2px}.vl.o .vl-num{color:var(--grn)}.vl.m .vl-num{color:var(--acc)}
.vl-giac{position:absolute;top:2px;right:2px;font-size:8px;background:rgba(0,0,0,.7);color:var(--yel);padding:1px 4px;border-radius:3px}
.da{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px}
.da label{font-size:11px;color:var(--dim)}
.da input[type="number"]{width:60px;background:var(--bg);border:1px solid var(--brd);color:var(--txt);padding:5px 6px;border-radius:6px;font-size:12px;font-family:inherit}
.miss-list{font-size:10px;color:var(--acc);margin-top:4px;line-height:1.4}

/* Action popup */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:80;display:flex;align-items:flex-end;justify-content:center}
.popup{background:var(--card);border:1px solid var(--brd);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:400px}
.popup h4{margin-bottom:12px;font-size:14px}
.popup-btns{display:flex;flex-direction:column;gap:8px}
.popup-btns .btn{padding:14px;font-size:14px;text-align:center}

/* Missing section */
.miss-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.miss-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.miss-card-hdr .sn-text{flex:1;font-weight:700;font-size:13px}
.miss-vols{display:flex;flex-wrap:wrap;gap:4px}
.miss-vol{display:flex;align-items:center;gap:4px;background:var(--mis);border:1px solid #5a2d2d;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer}
.miss-vol.in-cart{background:var(--blu);border-color:#4466aa;color:#fff}
.miss-vol .qty{width:30px;background:var(--bg);border:1px solid var(--brd);color:var(--txt);border-radius:4px;padding:2px;font-size:10px;text-align:center;font-family:inherit}

/* Cart */
.cart-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--brd);font-size:12px}
.cart-item .ci-name{flex:1;min-width:0}
.cart-item .ci-name strong{display:block;font-size:12px}.cart-item .ci-name span{color:var(--dim);font-size:10px}
.cart-total{display:flex;justify-content:space-between;padding:12px 0;font-weight:700;font-size:14px;border-top:2px solid var(--brd);margin-top:8px}

/* Hot section */
.hot-card{background:linear-gradient(135deg,#2a1a24,#1a1a24);border:1px solid #4a2a3a;border-radius:var(--r);padding:12px;margin-bottom:8px}
.hot-card h4{color:var(--hot);font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.hot-card p{font-size:12px;color:var(--dim);line-height:1.5}
.hot-tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;margin-right:4px}
.hot-tag.new{background:#4a2d2d;color:var(--acc)}.hot-tag.trend{background:#2d3a4a;color:var(--blu)}.hot-tag.fire{background:#4a3a2d;color:var(--yel)}
.hot-refresh{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.hot-loading{text-align:center;padding:30px;color:var(--dim)}
.hot-spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--brd);border-top-color:var(--hot);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Scanner */
.scan-box{display:grid;gap:12px}
.scan-video-wrap{position:relative;border:1px solid var(--brd);border-radius:14px;overflow:hidden;background:#05070a;min-height:220px}
.scan-video{width:100%;height:260px;object-fit:cover;background:#05070a;display:block}
.scan-target{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-target::before{content:'';width:min(74vw,260px);height:120px;border:2px solid rgba(255,255,255,.92);border-radius:14px;box-shadow:0 0 0 9999px rgba(0,0,0,.18)}
.scan-tip{font-size:11px;color:var(--dim);line-height:1.5}
.scan-actions{display:flex;gap:8px;flex-wrap:wrap}
.scan-result{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:12px;border:1px solid var(--brd);background:linear-gradient(135deg,#151922,#111318)}
.scan-cover{width:72px;height:102px;border-radius:10px;object-fit:cover;background:var(--bg);border:1px solid var(--brd)}
.scan-cover-ph{width:72px;height:102px;border-radius:10px;background:var(--bg);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;color:var(--dim)}
.scan-meta{flex:1;min-width:0}
.scan-meta h4{margin:0 0 6px;font-size:15px;color:var(--txt)}
.scan-meta .mini{font-size:11px;color:var(--dim);line-height:1.5}
.scan-code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--txt);background:var(--bg);border:1px solid var(--brd);padding:4px 8px;border-radius:999px;display:inline-block;margin-top:6px}
.scan-pill{display:inline-block;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;margin-right:6px;border:1px solid transparent}
.scan-pill.ok{background:rgba(59,178,115,.12);color:var(--grn);border-color:rgba(59,178,115,.25)}
.scan-pill.warn{background:rgba(255,184,0,.1);color:var(--yel);border-color:rgba(255,184,0,.2)}
.scan-pill.info{background:rgba(54,124,255,.1);color:var(--blu);border-color:rgba(54,124,255,.2)}
.scan-inline{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.scan-reader{position:relative;border:1px solid var(--brd);border-radius:14px;overflow:hidden;background:#05070a;min-height:280px}
.scan-reader:empty::before{content:'Scanner pronto';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px}
.scan-topbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.scan-topbar select,.scan-topbar input{background:var(--bg);border:1px solid var(--brd);color:var(--txt);padding:10px 12px;border-radius:10px;font-size:14px;font-family:inherit}
.scan-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:12px;align-items:start}
.scan-editor{display:grid;gap:10px}
.scan-editor .fd{margin:0}
.scan-editor-cta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.scan-history{display:grid;gap:8px;max-height:200px;overflow:auto;padding-right:2px}
.scan-history-item{display:flex;justify-content:space-between;gap:8px;padding:8px 10px;border-radius:10px;border:1px solid var(--brd);background:linear-gradient(135deg,#151922,#111318);font-size:12px}
.scan-history-item strong{display:block;color:var(--txt);font-size:12px}
.scan-history-item .mini{font-size:11px;color:var(--dim)}
.scan-mode-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--brd);font-size:11px;color:var(--dim);background:var(--bg)}
.scan-mini-actions{display:flex;gap:8px;flex-wrap:wrap}
.scan-stat{font-size:11px;color:var(--dim)}
#scan-reader__dashboard_section_csr span{color:#fff!important}
#scan-reader video{border-radius:0!important}
@media(max-width:760px){.scan-grid{grid-template-columns:1fr}.scan-reader{min-height:240px}}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.md{background:var(--card);border:1px solid var(--brd);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.md h3{margin-bottom:12px;font-size:16px}
.fd{margin-bottom:10px}.fd label{display:block;font-size:11px;color:var(--dim);margin-bottom:3px}
.fd input,.fd select{width:100%;background:var(--bg);border:1px solid var(--brd);color:var(--txt);padding:10px;border-radius:8px;font-size:14px;font-family:inherit}
.mb{display:flex;gap:8px;margin-top:12px}
input[type="file"]{display:none}

@media(min-width:640px){
  .app{padding:16px}.hdr h1{font-size:26px}.cv,.cv-ph{width:50px;height:70px}
  .sn{font-size:14px}.vg{grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:6px}
  .mo{align-items:center}.md{border-radius:12px}.popup{border-radius:12px;margin-bottom:20px}
}
@media(min-width:900px){.vg{grid-template-columns:repeat(auto-fill,minmax(72px,1fr))}}

/* Cloud shared state */
.cloud-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--brd);margin:-2px 0 12px;flex-wrap:wrap}
.cloud-banner strong{display:block;font-size:12px}
.cloud-banner span{font-size:11px;color:var(--dim)}
.cloud-banner.ok{background:linear-gradient(135deg,#14281f,#10181a);border-color:#275f49}
.cloud-banner.info{background:linear-gradient(135deg,#152331,#10181a);border-color:#335a8f}
.cloud-banner.warn{background:linear-gradient(135deg,#2d2412,#151515);border-color:#8f6b1d}
.cloud-banner.error{background:linear-gradient(135deg,#2d1414,#151515);border-color:#8f2d2d}
.cloud-banner.muted{background:linear-gradient(135deg,#1a1a24,#121218);border-color:var(--brd)}
.cloud-user{padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--txt)!important}
.cloud-help{font-size:11px;color:var(--dim);line-height:1.5}
.cloud-row{display:flex;gap:8px;flex-wrap:wrap}
.cloud-mini{font-size:10px;color:var(--dim)}
.cloud-kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:var(--bg);border:1px solid var(--brd);padding:2px 6px;border-radius:6px;color:var(--txt)}
.cloud-check{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txt)}
.cloud-check input{width:auto;accent-color:var(--acc)}
.cloud-sql{background:var(--bg);border:1px solid var(--brd);border-radius:10px;padding:10px;font-size:11px;color:var(--dim);line-height:1.5;white-space:pre-wrap;max-height:180px;overflow:auto}
.cloud-status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.cloud-status-dot.ok{background:var(--grn)}.cloud-status-dot.info{background:var(--blu)}.cloud-status-dot.warn{background:var(--yel)}.cloud-status-dot.error{background:var(--acc)}.cloud-status-dot.muted{background:var(--dim)}
.auth-note{font-size:11px;color:var(--dim);line-height:1.5;margin-top:8px}

</style>

function cleanImg(url){return String(url||'').trim().replace(/^http:/,'https:')}
function openLibraryCover(ean,size='L'){const code=digitsOnly(ean);return code.length>=10?`https://covers.openlibrary.org/b/isbn/${code}-${size}.jpg?default=false`:null}
function coverUrl(ean,img){

function parseScanTitleMeta(rawTitle){
  const raw=String(rawTitle||'').trim();
  if(!raw)return{seriesName:'',volume:null,title:''};
  let title=raw.replace(/\s+/g,' ').trim();
  let volume=null;
  const patterns=[/\b(?:vol(?:ume)?|n(?:umero)?|no\.?|#)\s*([0-9]{1,4})\b/i,/\b([0-9]{1,4})\s*$/i,/\b(?:tomo|parte)\s*([0-9]{1,4})\b/i];
  let match=null;
  for(const rx of patterns){const m=title.match(rx);if(m){match=m;volume=parseInt(m[1],10);if(Number.isFinite(volume))break}}
  let seriesName=title;
  if(match){seriesName=title.replace(match[0],' ').replace(/[\-–—:]+$/,'').replace(/\s+/g,' ').trim()}
  seriesName=seriesName.replace(/\b(?:manga|graphic novel|fumetto)\b$/i,'').replace(/\s+/g,' ').trim();
  return{seriesName:seriesName||title,volume:Number.isFinite(volume)&&volume>0?volume:null,title};
}
async function lookupBookByIsbn(code){
  const isbn=digitsOnly(code);
  if(isbn.length<8)return null;
  const out={ean:isbn,title:'',publisher:'',price:0,img:'',seriesName:'',volume:null,source:'manual'};
  try{
    const res=await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
    if(res.ok){
      const json=await res.json();
      const item=json?.items?.[0];
      if(item){
        const info=item.volumeInfo||{};
        out.title=(info.title||'').trim();
        out.publisher=(info.publisher||'').trim();
        out.price=parseNum(item.saleInfo?.listPrice?.amount)||0;
        out.img=cleanImg(info.imageLinks?.thumbnail||info.imageLinks?.smallThumbnail||'');
        out.source='google_books';
      }
    }
  }catch(e){}
  if(!out.title){
    try{
      const res=await fetch(`https://openlibrary.org/search.json?isbn=${isbn}&limit=1&fields=title,publisher,cover_i`);
      if(res.ok){
        const json=await res.json();
        const doc=json?.docs?.[0];
        if(doc){
          out.title=(doc.title||'').trim();
          out.publisher=Array.isArray(doc.publisher)?String(doc.publisher[0]||'').trim():String(doc.publisher||'').trim();
          if(doc.cover_i)out.img=`https://covers.openlibrary.org/b/id/${doc.cover_i}-L.jpg`;
          out.source='open_library_search';
        }
      }
    }catch(e){}
  }
  const meta=parseScanTitleMeta(out.title||isbn);
  out.seriesName=meta.seriesName;
  out.volume=meta.volume;
  if(!out.img)out.img=openLibraryCover(isbn,'L')||'';
  return out;
}

function normTxt(v){
  return String(v||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,' ').trim();
}
function digitsOnly(v){return String(v||'').replace(/\D+/g,'')}
function parseNum(v){
  if(v==null||v==='')return null;
  if(typeof v==='number'&&Number.isFinite(v))return v;
  const s=String(v).replace(/\./g,'').replace(',', '.').replace(/[^0-9.-]/g,'');
  if(!s)return null;
  const n=Number(s);
  return Number.isFinite(n)?n:null;
}
function parseQty(v){const n=parseNum(v);return n==null?null:Math.max(0,Math.round(Math.abs(n)))}
function parseDateSmart(v){
  if(v==null||v==='')return new Date().toISOString().slice(0,10);
  if(v instanceof Date && !isNaN(v))return v.toISOString().slice(0,10);
  if(typeof v==='number'&&window.XLSX?.SSF?.parse_date_code){
    const d=window.XLSX.SSF.parse_date_code(v);
    if(d&&d.y){
      const dt=new Date(Date.UTC(d.y,d.m-1,d.d));
      return dt.toISOString().slice(0,10);
    }
  }
  const s=String(v).trim();
  const m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})$/);
  if(m){
    const y=m[3].length===2?`20${m[3]}`:m[3];
    const dt=new Date(`${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}T00:00:00`);
    if(!isNaN(dt))return dt.toISOString().slice(0,10);
  }
  const dt=new Date(s);
  return isNaN(dt)?new Date().toISOString().slice(0,10):dt.toISOString().slice(0,10);
}
function pickField(row,keys){
  if(!row||typeof row!=='object')return '';
  const entries=Object.keys(row).map(k=>({raw:k,norm:normTxt(k).replace(/\s+/g,'')}));
  for(const wanted of keys){
    const found=entries.find(e=>e.norm.includes(wanted));
    if(found){
      const val=row[found.raw];
      if(val!==''&&val!=null)return val;
    }
  }
  return '';
}
function readWorkbookRows(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('Impossibile leggere il file.'));
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
        const out=[];
        wb.SheetNames.forEach(sn=>{
          const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:'',raw:false});
          rows.forEach(r=>out.push({...r,__sheet:sn}));
        });
        resolve(out);
      }catch(err){reject(err)}
    };
    reader.readAsArrayBuffer(file);
  });
}
function extractWinvRows(rows){
  const clean=(rows||[]).filter(r=>r&&typeof r==='object'&&Object.values(r).some(v=>String(v??'').trim()!==''));
  const out=[];
  clean.forEach((row,idx)=>{
    const ean=digitsOnly(pickField(row,['ean','isbn','barcode','codiceean','articoloean','codicearticolo','isbn13']));

    const stock=parseQty(pickField(row,['giacenza','disponibilita','rimanenza','residuo','stock']));
    const vol=parseQty(pickField(row,['volume','vol','numero','num']));

    if(!ean && !title) return;

}
function salesWindow(events,days,offsetDays=0){
  if(!Array.isArray(events)||!events.length)return 0;
  const today=new Date();
  today.setHours(0,0,0,0);
  const end=new Date(today);
  end.setDate(end.getDate()-offsetDays);
  const start=new Date(end);
  start.setDate(start.getDate()-(days-1));
  const startMs=start.getTime(), endMs=end.getTime();
  return events.reduce((sum,ev)=>{
    if(!ev||!ev.d)return sum;
    const t=new Date(ev.d+'T00:00:00').getTime();
    if(Number.isNaN(t) || t<startMs || t>endMs)return sum;
    return sum + (parseInt(ev.q)||0);
  },0);
}

  const s1=salesWindow(events,1);

  const s30=salesWindow(events,30);
  return {s1,s7,prev7,s30,last:v?.wv?.last||''};
}

  const items=[];
  const favSet=new Set(favs||[]);
  const series=(data||[]).filter(d=>d&&d.s);
  const salesSeries=series.map(d=>{
    const vols=(d.vd||[]).map(v=>({v,...volumeSalesSnapshot(v)}));
    const s1=vols.reduce((s,x)=>s+x.s1,0);
    const s7=vols.reduce((s,x)=>s+x.s7,0);
    const prev7=vols.reduce((s,x)=>s+x.prev7,0);
    const s30=vols.reduce((s,x)=>s+x.s30,0);
    const low=vols.filter(x=>(parseInt(x.v.g)||0)<=1 && x.s30>0).map(x=>x.v.n);
    return {d,vols,s1,s7,prev7,s30,delta:s7-prev7,low};
  }).filter(x=>x.s30>0||x.s7>0||x.s1>0);

  salesSeries.sort((a,b)=>b.s7-a.s7 || b.s1-a.s1 || b.s30-a.s30);
  if(salesSeries.length){
    salesSeries.slice(0,3).forEach(x=>items.push({
      tag:x.s1>0?'fire':'trend',
      title:`${x.d.n}`,
      text:`Vendite registrate: ${x.s1} oggi · ${x.s7} negli ultimi 7 giorni · ${x.s30} negli ultimi 30 giorni.`
    }));
    const accelerations=[...salesSeries].filter(x=>x.delta>0).sort((a,b)=>b.delta-a.delta).slice(0,2);
    accelerations.forEach(x=>items.push({
      tag:'trend',
      title:`Accelerazione · ${x.d.n}`,
      text:`Settimana corrente ${x.s7} vs precedente ${x.prev7}. Crescita netta di ${x.delta} copie.`
    }));
    const lowStock=[...salesSeries].filter(x=>x.low.length>0).sort((a,b)=>b.low.length-a.low.length).slice(0,2);
    lowStock.forEach(x=>items.push({
      tag:'new',
      title:`Stock sotto soglia · ${x.d.n}`,
      text:`Volumi a 0/1 copie con domanda recente: ${x.low.slice(0,8).join(', ')}${x.low.length>8?'…':''}.`
    }));
  }

  const incomplete=series.map(d=>({d,miss:gm(d.h,d.ut||d.mx),own:d.h.length,total:d.ut||d.mx||0})).filter(x=>x.miss.length>0&&x.total>0);
  const nearComplete=[...incomplete].sort((a,b)=>(a.miss.length-b.miss.length)||(b.own-a.own)).slice(0,2);
  const favSeries=(data||[]).filter(d=>favSet.has(d.id)).slice(0,2);
  const groupedCart=Object.values((cart||[]).reduce((acc,c)=>{
    const k=c.name||`${c.sid}`;
    if(!acc[k])acc[k]={name:c.name,qty:0,vols:[]};
    acc[k].qty+=(parseInt(c.qty)||0);
    if(c.vol!=null)acc[k].vols.push(c.vol);
    return acc;
  },{})).sort((a,b)=>b.qty-a.qty);

  if(cart&&cart.length){
    items.push({tag:'fire',title:'Ordine condiviso in corso',text:`${cart.reduce((s,c)=>s+(parseInt(c.qty)||0),0)} pezzi su ${groupedCart.length} titoli. Tutti gli utenti vedono lo stesso carrello.`});
  }
  nearComplete.forEach(x=>items.push({tag:'trend',title:x.d.n,text:`Serie quasi completa: ${x.own}/${x.total}. Mancano ${x.miss.length} volumi${x.miss.length?` (${x.miss.slice(0,6).join(', ')}${x.miss.length>6?'…':''})`:''}.`}));
  favSeries.forEach(d=>items.push({tag:'trend',title:`Preferito operativo · ${d.n}`,text:`Titolo marcato come preferito. ${d.s?`${d.h.length}/${d.ut||d.mx} volumi presenti.`:'Titolo singolo in evidenza.'}`}));
  if(!items.length){
    const publishers=Object.entries((data||[]).reduce((acc,d)=>{acc[d.e]=(acc[d.e]||0)+1;return acc;},{})).sort((a,b)=>b[1]-a[1]).slice(0,3);
    if(publishers.length)items.push({tag:'new',title:'Distribuzione catalogo',text:`Editori più rappresentati: ${publishers.map(([e,c])=>`${e} (${c})`).join(' · ')}.`});
  }
  if(!items.length)items.push({tag:'new',title:'Hot locale pronto',text:'Importa un export WinVaria e la sezione Hot inizierà a leggere vendite reali, stock e accelerazioni.'});
  return items.slice(0,10);
}

function CoverImg({ean,img,size}){
  const[ok,setOk]=useState(true);const url=coverUrl(ean,img);
  const w=size||42;const h=Math.round(w*1.4);
  const onL=useCallback(e=>{if(e.target.naturalWidth<10)setOk(false)},[]);
  if(url&&ok)return <img style={{width:w,height:h,borderRadius:4,objectFit:'cover',background:'var(--brd)'}} src={url} alt="" loading="lazy" onError={()=>setOk(false)} onLoad={onL}/>;
  return <div className="cv-ph" style={{width:w,height:h}}>📖</div>;
}

function VolCover({ean,img,num}){
  const[ok,setOk]=useState(true);const url=coverUrl(ean,img);

  if(url&&ok)return <img className="vl-img" src={url} alt={num} loading="lazy" onError={()=>setOk(false)} onLoad={onL}/>;
  return <div className="vl-ph">{num}</div>;
}

  const[authForm,setAuthForm]=useState({email:'',password:''});
  const[authMsg,setAuthMsg]=useState('');
  const[winMsg,setWinMsg]=useState('');
  const[winBusy,setWinBusy]=useState(false);
  const[showScan,setShowScan]=useState(false);
  const[scanCode,setScanCode]=useState('');
  const[scanMsg,setScanMsg]=useState('');
  const[scanBusy,setScanBusy]=useState(false);
  const[scanRunning,setScanRunning]=useState(false);
  const[scanResult,setScanResult]=useState(null);
  const[scanQty,setScanQty]=useState(1);
  const[scanCameras,setScanCameras]=useState([]);
  const[scanCameraId,setScanCameraId]=useState('');
  const[scanHistory,setScanHistory]=useState(()=>{const v=safeParse(localStorage.getItem(K_SCAN_HISTORY),[]);return Array.isArray(v)?v:[]});
  const[scanEditor,setScanEditor]=useState({title:'',seriesName:'',publisher:'',volume:'',price:''});
  const fRef=useRef(null);
  const fWinRef=useRef(null);
  const scanFileRef=useRef(null);
  const scanBusyRef=useRef(false);
  const scanInstanceRef=useRef(null);
  const lastScanRef=useRef({code:'',ts:0});
  const hydrateRef=useRef(false);
  const lastRemoteRef=useRef('');
  const pushTimerRef=useRef(null);
  const channelRef=useRef(null);
  const channelClientRef=useRef(null);
  const cloudPayloadRef=useRef(normalizePayload({data,favs,cart}));

  const cloudEnabled=!!(cloudCfg.url&&cloudCfg.key);

  const applyRemotePayload=useCallback((payload,updatedAt)=>{
    const normalized=normalizePayload(payload);
    hydrateRef.current=true;
    setData(normalized.data);
    setFavs(normalized.favs);
    setCart(normalized.cart);
    if(updatedAt){
      const t=new Date(updatedAt).toLocaleString('it-IT');
      localStorage.setItem(K_TS,t);
      setTs(t);
    }
  },[]);

  const cloudPayload=useMemo(()=>normalizePayload({data,favs,cart}),[data,favs,cart]);
  useEffect(()=>{try{localStorage.setItem(K_SCAN_HISTORY,JSON.stringify((scanHistory||[]).slice(0,30)))}catch(e){}},[scanHistory]);

  useEffect(()=>{cloudPayloadRef.current=cloudPayload},[cloudPayload]);

  useEffect(()=>{try{
    localStorage.setItem(K_DATA,JSON.stringify(data));
    localStorage.setItem(K_FAV,JSON.stringify(favs));
    localStorage.setItem(K_CART,JSON.stringify(cart));
    if(!(supabase&&session&&remoteLoaded)){
      const t=new Date().toLocaleString('it-IT');
      localStorage.setItem(K_TS,t);
      setTs(t);
    }
  }catch(e){}}, [data,favs,cart,supabase,session,remoteLoaded]);

  const loadHot=useCallback(()=>{
    setHotLoading(true);
    const next=buildLocalHot(data,favs,cart);
    setHotData(next);
    window.clearTimeout(loadHot._t);
    loadHot._t=window.setTimeout(()=>setHotLoading(false),120);
  },[data,favs,cart]);
  useEffect(()=>{loadHot()}, [loadHot]);

  useEffect(()=>{
    const onReady=()=>setCloudReady(true);
    window.addEventListener('supabase-ready',onReady);
    return()=>window.removeEventListener('supabase-ready',onReady);
  },[]);

  useEffect(()=>{
    let cancelled=false;
    if(!cloudReady||!cloudEnabled){
      setSupabase(null);
      setSession(null);
      setRemoteLoaded(false);
      setCloudInfo({tone:'warn',title:'Cloud disattivato',text:'La configurazione incorporata è stata rimossa da questo dispositivo. Ripristino i valori predefiniti del file.'});
      return;
    }
    try{
      const client=window.supabaseLib.createClient(cleanSupabaseUrl(cloudCfg.url),cloudCfg.key,{
        auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}
      });
      if(cancelled)return;
      setSupabase(client);
      setCloudInfo({tone:'info',title:'Cloud configurato',text:'Client Supabase pronto. Effettua l’accesso per leggere e scrivere lo stato comune.'});
      client.auth.getSession().then(({data})=>{if(!cancelled)setSession(data.session||null)}).catch(()=>{});
      const authSub=client.auth.onAuthStateChange((_event,newSession)=>{
        if(cancelled)return;
        setSession(newSession||null);
        if(newSession){
          setCloudInfo({tone:'info',title:'Autenticato',text:'Sto collegando lo stato condiviso del negozio…'});
          setShowAuth(false);
        }else{
          setRemoteLoaded(false);
          setCloudInfo({tone:'warn',title:'Cloud configurato ma non autenticato',text:'Accedi per usare la memoria condivisa.'});
        }
      });
      return()=>{
        cancelled=true;
        try{authSub.data.subscription.unsubscribe()}catch(e){}
      };
    }catch(err){
      setCloudInfo({tone:'error',title:'Errore client Supabase',text:err.message||'Configurazione non valida.'});
    }
  },[cloudReady,cloudEnabled,cloudCfg.url,cloudCfg.key]);

  const startRealtime=useCallback((client)=>{
    if(!client)return;
    if(channelRef.current&&channelClientRef.current===client)return;
    try{
      if(channelRef.current&&channelClientRef.current){
        channelClientRef.current.removeChannel(channelRef.current);
      }
    }catch(e){}
    const channel=client
      .channel('app-state-live')
      .on('postgres_changes',{event:'*',schema:'public',table:'app_state',filter:`id=eq.${CLOUD_ROW_ID}`},payload=>{
        const row=payload.new||payload.record||null;
        if(!row||!row.payload)return;
        const normalized=normalizePayload(row.payload);
        const nextHash=stable(normalized);
        if(nextHash===lastRemoteRef.current){
          if(row.updated_at){
            const t=new Date(row.updated_at).toLocaleString('it-IT');
            localStorage.setItem(K_TS,t);
            setTs(t);
          }
          setCloudInfo({tone:'ok',title:'Cloud sincronizzato',text:'Tutte le modifiche sono condivise.'});
          return;
        }
        lastRemoteRef.current=nextHash;
        applyRemotePayload(normalized,row.updated_at);
        setCloudInfo({tone:'ok',title:'Aggiornamento remoto ricevuto',text:'Un altro utente ha modificato lo stato condiviso.'});
      })
      .subscribe(status=>{
        if(status==='SUBSCRIBED')setCloudInfo({tone:'ok',title:'Realtime attivo',text:'Le modifiche dovrebbero propagarsi quasi in tempo reale.'});
        if(status==='CHANNEL_ERROR')setCloudInfo({tone:'warn',title:'Realtime non attivo',text:'La sync continua comunque tramite caricamento/salvataggio standard.'});
      });
    channelRef.current=channel;
    channelClientRef.current=client;
  },[applyRemotePayload]);

  const pushRemote=useCallback(async(payloadOverride)=>{
    if(!supabase||!session)return;
    const payload=normalizePayload(payloadOverride||cloudPayloadRef.current);
    setCloudInfo({tone:'info',title:'Sincronizzazione in corso',text:'Invio le modifiche al database condiviso…'});
    try{
      const {data:row,error}=await supabase
        .from('app_state')
        .upsert({id:CLOUD_ROW_ID,payload,updated_by:session.user.id},{onConflict:'id'})
        .select('updated_at,payload')
        .single();
      if(error){
        setCloudInfo({tone:'error',title:'Sync fallita',text:error.message||'Controlla tabelle, RLS e chiave Supabase.'});
        return;
      }
      const nextPayload=normalizePayload((row&&row.payload)||payload);
      lastRemoteRef.current=stable(nextPayload);
      if(row&&row.updated_at){
        const t=new Date(row.updated_at).toLocaleString('it-IT');
        localStorage.setItem(K_TS,t);
        setTs(t);
      }
      setCloudInfo({tone:'ok',title:'Cloud sincronizzato',text:'Le modifiche sono ora persistenti per tutti gli utenti autorizzati.'});
    }catch(err){
      const msg=isNetworkFetchError(err)?cloudFetchHint(cloudCfg.url):(err?.message||'Errore inatteso durante la sincronizzazione cloud.');
      setCloudInfo({tone:'error',title:'Sync cloud non raggiungibile',text:msg});
    }
  },[supabase,session,cloudCfg.url]);

  const loadRemote=useCallback(async()=>{
    if(!supabase||!session)return;
    setCloudInfo({tone:'info',title:'Caricamento cloud',text:'Sto leggendo lo stato condiviso…'});
    try{
      const {data:row,error}=await supabase
        .from('app_state')
        .select('id,payload,updated_at')
        .eq('id',CLOUD_ROW_ID)
        .maybeSingle();
      if(error){
        setCloudInfo({tone:'error',title:'Lettura cloud fallita',text:error.message||'Verifica tabella public.app_state e policy RLS.'});
        return;
      }
      if(!row){
        const initialPayload=normalizePayload(cloudPayloadRef.current);
        lastRemoteRef.current=stable(initialPayload);
        await pushRemote(initialPayload);
        setRemoteLoaded(true);
        startRealtime(supabase);
        return;
      }
      const normalized=normalizePayload(row.payload);
      lastRemoteRef.current=stable(normalized);
      applyRemotePayload(normalized,row.updated_at);
      setRemoteLoaded(true);
      setCloudInfo({tone:'ok',title:'Cloud collegato',text:'Stai lavorando sullo stato condiviso centrale.'});
      startRealtime(supabase);
    }catch(err){
      const msg=isNetworkFetchError(err)?cloudFetchHint(cloudCfg.url):(err?.message||'Errore inatteso durante la lettura cloud.');
      setCloudInfo({tone:'error',title:'Cloud non raggiungibile',text:msg});
    }
  },[supabase,session,pushRemote,applyRemotePayload,startRealtime,cloudCfg.url]);

  useEffect(()=>{
    if(!supabase||!session){
      setRemoteLoaded(false);
      return;
    }
    loadRemote();
    return()=>{};
  },[supabase,session,loadRemote]);

  useEffect(()=>{
    if(hydrateRef.current){
      hydrateRef.current=false;
      return;
    }
    if(!supabase||!session||!remoteLoaded)return;
    clearTimeout(pushTimerRef.current);
    pushTimerRef.current=setTimeout(()=>{pushRemote()},700);
    return()=>clearTimeout(pushTimerRef.current);
  },[data,favs,cart,supabase,session,remoteLoaded,pushRemote]);

  useEffect(()=>()=>{try{if(channelRef.current&&channelClientRef.current)channelClientRef.current.removeChannel(channelRef.current)}catch(e){}},[]);

  const editori=useMemo(()=>{const m={};data.forEach(d=>{m[d.e]=(m[d.e]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1])}, [data]);
  const stats=useMemo(()=>{let ow=0,mi=0,pz=0;data.forEach(d=>{if(d.s){ow+=d.h.length;const mx=d.ut||d.mx;for(let i=1;i<=mx;i++)if(!d.h.includes(i))mi++}pz+=d.tp});return{t:data.length,ow,mi,pz}}, [data]);
  const salesStats=useMemo(()=>{let s1=0,s7=0,s30=0,low=0,last='';data.forEach(d=>{(d.vd||[]).forEach(v=>{const snap=volumeSalesSnapshot(v);s1+=snap.s1;s7+=snap.s7;s30+=snap.s30;if((parseInt(v.g)||0)<=1 && snap.s30>0)low++;if(snap.last&&(!last||snap.last>last))last=snap.last})});return{s1,s7,s30,low,last}},[data]);

  function getEanMap(d){const m={};(d.vd||[]).forEach(v=>{if(v.ean)m[v.n]=v.ean});return m}
  function getSeriesEan(d){if(d.vd&&d.vd.length>0){const f=d.vd.find(v=>v.ean);if(f)return f.ean}if(d.st&&d.st.length>0){const f=d.st.find(s=>s.ean);if(f)return f.ean}return null}
  function getSeriesImg(d){if(d.vd&&d.vd.length>0){const f=d.vd.find(v=>v.img);if(f)return f.img}if(d.st&&d.st.length>0){const f=d.st.find(s=>s.img);if(f)return f.img}return ''}
  function findBarcodeMatch(list,code){
    const isbn=digitsOnly(code);
    if(!isbn)return null;
    for(const d of list){
      if(d.s){
        for(const v of (d.vd||[])){
          if(digitsOnly(v.ean)===isbn)return{kind:'series',sid:d.id,vol:v.n,title:v.t||`${d.n} ${v.n}`,seriesName:d.n,ean:isbn,img:v.img||'',publisher:d.e,price:v.p||d.p||0};
        }
      }else{
        for(let i=0;i<(d.st||[]).length;i++){
          const s=d.st[i];
          if(digitsOnly(s.ean)===isbn)return{kind:'standalone',sid:d.id,index:i,title:s.t||d.n,seriesName:d.n,ean:isbn,img:s.img||'',publisher:d.e,price:s.p||d.p||0};
        }
      }
    }
    return null;
  }

    setCart(p=>{const existing=p.findIndex(c=>c.sid===seriesId&&c.vol===vol);

  function popupBoth(){const{sid,vol}=popup;togVol(sid,vol);addToCart(sid,vol,1);setPopup(null)}

  function togVol(id,v){setData(p=>p.map(d=>{if(d.id!==id)return d;const has=d.h.includes(v);const nh=has?d.h.filter(x=>x!==v):[...d.h,v].sort((a,b)=>a-b);return{...d,h:nh,m:gm(nh,d.ut||d.mx),tp:d.tp+(has?-1:1)}}))}
  function updMax(id,v){setData(p=>p.map(d=>{if(d.id!==id)return d;const nm=parseInt(v)||d.mx;return{...d,ut:nm,mx:Math.max(d.mx,nm),m:gm(d.h,nm)}}))}
  function addS(ns){const id=data.length?Math.max(...data.map(d=>d.id))+1:0;setData(p=>[...p,{...ns,id,m:gm(ns.h,ns.ut),vd:[],tp:ns.s?ns.h.length:1}]);setShowAdd(false)}

  const onCodeDetected=useCallback(async(decodedText, source='camera')=>{

    if(code.length<8)return;
    const now=Date.now();
    if(lastScanRef.current.code===code && (now-lastScanRef.current.ts)<1800)return;
    lastScanRef.current={code,ts:now};
    try{navigator.vibrate?.(60)}catch(e){}
    await stopScanner();
    await runBarcodeLookup(code, source);
  },[runBarcodeLookup,stopScanner]);

        aspectRatio:1.777,
        disableFlip:false,
        rememberLastUsedCamera:true,
        formatsToSupport:window.Html5QrcodeSupportedFormats?[

      const chosen=scanCameraId || (cams.find(c=>/back|rear|environment|wide/i.test(String(c.label||'')))?.id) || {facingMode:'environment'};

  function applyScanDelta(mode){
    if(!scanResult)return;
    const qty=Math.max(1,parseInt(scanQty)||1);
    const delta=mode==='load'?qty:-qty;
    const code=digitsOnly(scanResult.code||scanCode);
    if(!code)return;
    if(delta<0 && !scanResult.match){setScanMsg('Per scaricare devo trovare prima il volume nel database.');return}
    const editorBook={
      ...(scanResult.book||{}),
      ean:code,
      title:String(scanEditor.title||scanResult.book?.title||scanResult.match?.title||'').trim(),
      seriesName:String(scanEditor.seriesName||scanResult.book?.seriesName||scanResult.match?.seriesName||'').trim(),
      publisher:String(scanEditor.publisher||scanResult.book?.publisher||scanResult.match?.publisher||'').trim(),
      volume:parseQty(scanEditor.volume),
      price:parseNum(scanEditor.price)||0
    };
    setData(prev=>{
      const next=typeof structuredClone==='function'?structuredClone(prev):JSON.parse(JSON.stringify(prev));
      const match=findBarcodeMatch(next,code)||scanResult.match;
      const book=editorBook;
      if(match){
        const item=next.find(d=>d.id===match.sid);
        if(!item)return prev;
        if(match.kind==='series'){
          item.vd=item.vd||[];
          let meta=item.vd.find(v=>v.n===match.vol);
          if(!meta){meta={n:match.vol,g:0,p:book.price||item.p||0,ean:code,t:book.title||match.title,img:book.img||match.img||''};item.vd.push(meta)}
          meta.ean=code;
          if(book.title)meta.t=book.title;
          if(book.img)meta.img=book.img;
          const current=Number(meta.g||0)|| (item.h.includes(match.vol)?1:0);
          const qtyNow=Math.max(0,current+delta);
          meta.g=qtyNow;
          if(qtyNow>0){if(!item.h.includes(match.vol))item.h.push(match.vol);item.h=item.h.sort((a,b)=>a-b)}
          else item.h=item.h.filter(v=>v!==match.vol);
          item.tp=item.h.length;
          item.mx=Math.max(item.mx||0,item.ut||0,match.vol||0);
          item.ut=Math.max(item.ut||0,match.vol||0);
          item.m=gm(item.h,item.ut||item.mx);
        }else{
          item.st=item.st||[];
          let row=item.st[match.index]||item.st[0];
          if(!row){row={t:book.title||item.n,g:0,p:book.price||item.p||0};item.st=[row]}
          row.ean=code;
          if(book.title)row.t=book.title;
          if(book.img)row.img=book.img;
          row.g=Math.max(0,(Number(row.g)||0)+delta);
          item.tp=(item.st||[]).reduce((s,r)=>s+(Number(r.g)||0),0);
        }
        return next;
      }
      const parsed=parseScanTitleMeta(book.title||code);
      const seriesName=(book.seriesName||parsed.seriesName||book.title||code).trim();
      const vol=book.volume||parsed.volume;
      const existing=next.find(d=>d.s&&normTxt(d.n)===normTxt(seriesName));
      if(existing&&vol){
        existing.vd=existing.vd||[];
        let meta=existing.vd.find(v=>v.n===vol);
        if(!meta){meta={n:vol,g:0,p:book.price||existing.p||0,ean:code,t:book.title||`${existing.n} ${vol}`,img:book.img||''};existing.vd.push(meta)}
        meta.g=Math.max(0,(Number(meta.g)||0)+qty);
        meta.ean=code;
        if(book.title)meta.t=book.title;
        if(book.img)meta.img=book.img;
        if(!existing.h.includes(vol))existing.h.push(vol);
        existing.h=existing.h.sort((a,b)=>a-b);
        existing.mx=Math.max(existing.mx||0,vol);
        existing.ut=Math.max(existing.ut||0,vol);
        existing.tp=existing.h.length;
        existing.m=gm(existing.h,existing.ut||existing.mx);
        return next;
      }
      const id=next.length?Math.max(...next.map(d=>d.id))+1:0;
      if(vol){
        next.push({id,n:seriesName.toUpperCase(),e:(book.publisher||'N/A').toUpperCase(),h:[vol],m:gm([vol],Math.max(vol,1)),mx:Math.max(vol,1),tu:Math.max(vol,1),ut:Math.max(vol,1),p:book.price||0,tp:1,s:true,vd:[{n:vol,g:qty,p:book.price||0,ean:code,t:(book.title||`${seriesName} ${vol}`).toUpperCase(),img:book.img||''}],st:[]});
      }else{
        next.push({id,n:(book.title||seriesName||code).toUpperCase(),e:(book.publisher||'N/A').toUpperCase(),h:[],m:[],mx:0,tu:0,ut:0,p:book.price||0,tp:qty,s:false,vd:[],st:[{t:(book.title||seriesName||code).toUpperCase(),g:qty,p:book.price||0,ean:code,img:book.img||''}]});
      }
      return next;
    });
    const label=mode==='load'?'carico':'scarico';
    recordScanHistory({at:new Date().toISOString(),code,title:(scanEditor.title||scanResult.book?.title||scanResult.match?.title||code),action:label,qty,source:scanResult.source||'manual'});
    setScanMsg(`${label.charAt(0).toUpperCase()+label.slice(1)} registrato: ${qty} ${qty===1?'copia':'copie'} nel database condiviso.`);
  }

  async function importWinvariaFile(e){
    const file=e.target.files?.[0];
    if(!file)return;
    setWinBusy(true);
    setWinMsg('Lettura file WinVaria in corso…');
    try{
      const rows=await readWorkbookRows(file);
      const entries=extractWinvRows(rows);
      if(!entries.length){setWinMsg('Nessuna riga utile trovata. Servono almeno EAN/ISBN o titolo, più quantità venduta o giacenza.');setWinBusy(false);e.target.value='';return}
      let summary={matched:0,unmatched:0,qty:0,stock:0};
      setData(prev=>{
        const next=typeof structuredClone==='function'?structuredClone(prev):JSON.parse(JSON.stringify(prev));
        const eanIndex=new Map();
        next.forEach(d=>(d.vd||[]).forEach(v=>{const e=digitsOnly(v.ean);if(e)eanIndex.set(e,{sid:d.id,vol:v.n})}));
        const findByTitle=(entry)=>{
          const title=normTxt(entry.title);
          if(!title)return null;
          for(const d of next){
            const dn=normTxt(d.n);
            if(!dn)continue;
            if(title.includes(dn) || dn.includes(title)){
              let vol=entry.vol;
              if(!vol){
                const m=String(entry.title).match(/(?:vol(?:ume)?|n(?:r|um)?\.?|#)\s*(\d{1,3})/i) || String(entry.title).match(/(\d{1,3})/);
                vol=m?parseInt(m[1],10):null;
              }
              if(d.s && vol && (d.vd||[]).some(v=>v.n===vol))return {sid:d.id,vol};
              if(!d.s)return {sid:d.id,vol:null};
            }
          }
          return null;
        };
        entries.forEach(entry=>{
          let match=entry.ean?eanIndex.get(entry.ean):null;
          if(!match)match=findByTitle(entry);
          if(!match){summary.unmatched++;return}
          const d=next.find(x=>x.id===match.sid);
          if(!d)return;
          const volRec=(d.vd||[]).find(v=>v.n===match.vol);
          if(!volRec){summary.unmatched++;return}
          if(entry.stock!=null){volRec.g=Math.max(0,entry.stock);summary.stock++;}
          else if(entry.qty>0){volRec.g=Math.max(0,(parseInt(volRec.g)||0)-entry.qty);summary.stock++;}
          if(entry.qty>0){
            if(!volRec.wv||typeof volRec.wv!=='object')volRec.wv={events:[],total:0,last:''};
            if(!Array.isArray(volRec.wv.events))volRec.wv.events=[];
            const ev=volRec.wv.events.find(x=>x.d===entry.date);
            if(ev)ev.q+=(parseInt(entry.qty)||0); else volRec.wv.events.push({d:entry.date,q:parseInt(entry.qty)||0});
            volRec.wv.total=(parseInt(volRec.wv.total)||0)+(parseInt(entry.qty)||0);
            volRec.wv.last=entry.date;
            summary.qty+=(parseInt(entry.qty)||0);
          }
          summary.matched++;
        });
        next.forEach(d=>{
          if(d.s && Array.isArray(d.vd) && d.vd.length){
            const owned=d.vd.filter(v=>(parseInt(v.g)||0)>0).map(v=>v.n).sort((a,b)=>a-b);
            d.h=owned;
            d.m=gm(owned,d.ut||d.mx);
            d.tp=d.vd.reduce((s,v)=>s+(parseInt(v.g)||0),0);
          }
        });
        return next;
      });
      const now=new Date().toLocaleString('it-IT');
      setTs(now);
      setWinMsg(`WinVaria importato: ${summary.matched} righe agganciate, ${summary.unmatched} non agganciate, ${summary.qty} copie vendute registrate, ${summary.stock} giacenze aggiornate · ${file.name}`);
    }catch(err){
      setWinMsg(`Import WinVaria fallito: ${err.message||err}`);
    }finally{
      setWinBusy(false);
      if(e.target)e.target.value='';
    }
  }

    setAuthMsg('Invio richiesta…');

      if(mode==='signin'){

        if(error)throw error;

      setAuthMsg(isNetworkFetchError(err)?cloudFetchHint(cloudCfg.url):(err.message||'Errore di autenticazione.'))

              <CoverImg ean={seriesEan} img={seriesImg}/>
              <div className="sh-info">
                <div className="sn"><span className="sn-text">{d.n}</span>
                  {d.s?(isCo?<span className="bdg c">OK</span>:<span className="bdg i">{miss.length}</span>):<span className="bdg sa">1</span>}</div>
                <div style={{fontSize:10,color:'var(--dim)'}}>{d.e}</div>
              </div>
              <button className="fav-btn" onClick={e=>{e.stopPropagation();togFav(d.id)}}>{isFav(d.id)?'⭐':'☆'}</button>
              <div className="sh-meta">
                {d.s&&<div className="pb"><div className={`f ${pct>=80?'fg':pct>=40?'fy':'fr'}`} style={{width:`${pct}%`}}/></div>}
                <div className="vc">{d.s?`${d.h.length}/${mx}`:`${d.tp}pz`}</div>
              </div>
            </div>
            {isE&&<div className="sd">
              <div className="sd-ed">{d.e} · €{d.p.toFixed(2)} · {d.tp}pz</div>
              {d.s?<><div className="vg">{Array.from({length:mx},(_,i)=>i+1).map(v=>{
                const owned=d.h.includes(v);const ean=eanMap[v]||null;
                const vd=(d.vd||[]).find(x=>x.n===v);
                return(<div key={v} className={`vl ${owned?'o':'m'}`}
                  onClick={e=>{e.stopPropagation();if(owned)togVol(d.id,v);else onMissingTap(d.id,v)}}>
                  <VolCover ean={ean} img={vd?.img} num={v}/>
                  <div className="vl-num">{v}</div>
                  {vd&&vd.g>1&&<div className="vl-giac">×{vd.g}</div>}
                </div>)})}</div>
                <div className="da">
                  <label>Tot.usciti:</label>
                  <input type="number" value={mx} min={1} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();updMax(d.id,e.target.value)}}/>
                  <button className="btn bs bg" onClick={e=>{e.stopPropagation();delS(d.id)}}>Elimina</button>
                </div>
                {miss.length>0&&<div className="miss-list">Mancanti: {miss.join(', ')}</div>}
              </>:<div style={{fontSize:12}}>
                {(d.st||[]).map((s,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:'1px solid var(--brd)'}}>
                  <span>{s.t}</span><span style={{color:'var(--yel)'}}>€{s.p.toFixed(2)}×{s.g}</span></div>)}
                <div className="da" style={{marginTop:6}}><button className="btn bs bg" onClick={e=>{e.stopPropagation();delS(d.id)}}>Elimina</button></div>
              </div>}
            </div>}
          </div>)})}</div>
    </>
  );

  const renderMissing=()=>(
    <>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <h2 style={{fontSize:16}}>Numeri mancanti ({missingData.reduce((s,d)=>s+d.miss.length,0)})</h2>
      </div>
      {missingData.length===0?<div className="emp">Nessun volume mancante!</div>:
        missingData.map(d=>(
          <div key={d.id} className="miss-card">
            <div className="miss-card-hdr">
              <CoverImg ean={getSeriesEan(d)} img={getSeriesImg(d)} size={32}/>
              <span className="sn-text">{d.n}</span>
              <span style={{fontSize:10,color:'var(--dim)'}}>{d.miss.length} manc.</span>
              <button className="btn bs bpur" onClick={()=>addAllMissing(d.id)}>+ Tutti al carrello</button>
            </div>
            <div className="miss-vols">
              {d.miss.map(v=>(
                <div key={v} className={`miss-vol${isInCart(d.id,v)?' in-cart':''}`}
                  onClick={()=>{if(isInCart(d.id,v))removeFromCart(d.id,v);else addToCart(d.id,v,1)}}>
                  <span>Vol.{v}</span>
                  {isInCart(d.id,v)&&<input className="qty" type="number" min="1" value={cart.find(c=>c.sid===d.id&&c.vol===v)?.qty||1}
                    onClick={e=>e.stopPropagation()}
                    onChange={e=>{e.stopPropagation();addToCart(d.id,v,parseInt(e.target.value)||1)}}/>}
                </div>))}
            </div>
          </div>))}
    </>
  );

  const renderCart=()=>(
    <>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <h2 style={{fontSize:16}}>Carrello ordine ({cart.length} voci)</h2>
        {cart.length>0&&<div style={{display:'flex',gap:6}}>
          <button className="btn bs bgrn" onClick={exportXLS}>📦 Esporta XLS</button>
          <button className="btn bs bg" onClick={clearCart}>Svuota</button>
        </div>}
      </div>
      {cart.length===0?<div className="emp">Carrello vuoto. Aggiungi volumi dalla sezione Mancanti o dal catalogo.</div>:
        <>{cart.map((c,i)=>(
          <div key={i} className="cart-item">
            <div className="ci-name"><strong>{c.name}</strong><span>{c.editore} · Vol.{c.vol} · EAN: {c.ean||'N/A'}</span></div>
            <input type="number" min="1" value={c.qty} style={{width:40,background:'var(--bg)',border:'1px solid var(--brd)',color:'var(--txt)',borderRadius:4,padding:4,fontSize:12,textAlign:'center',fontFamily:'inherit'}}
              onChange={e=>addToCart(c.sid,c.vol,parseInt(e.target.value)||1)}/>
            <span style={{color:'var(--yel)',fontSize:12,minWidth:50,textAlign:'right'}}>€{(c.prezzo*c.qty).toFixed(2)}</span>
            <button className="btn bs bg" onClick={()=>removeFromCart(c.sid,c.vol)}>✕</button>
          </div>))}
          <div className="cart-total">
            <span>TOTALE ({cart.reduce((s,c)=>s+c.qty,0)} pezzi)</span>
            <span style={{color:'var(--yel)'}}>€{cart.reduce((s,c)=>s+c.prezzo*c.qty,0).toFixed(2)}</span>
          </div>
        </>}
    </>
  );

  const renderHot=()=>(
    <>
      <div className="bbar" style={{alignItems:'flex-start'}}>
        <div className="inf"><strong>🔌 Integrazione WinVaria + scanner</strong>Importa l’export giornaliero WinVaria oppure usa la fotocamera del telefono per caricare/scaricare un volume direttamente dal database condiviso.</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button className="btn bgrn bs" onClick={()=>fWinRef.current?.click()} disabled={winBusy}>{winBusy?'Import…':'⬆ Importa WinVaria'}</button>
          <button className="btn bs bb" onClick={()=>setShowScan(true)}>📷 Scanner</button>
          <input ref={fWinRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={importWinvariaFile}/>
          <button className="btn bs ba" onClick={loadHot} disabled={hotLoading}>{hotLoading?'Calcolo…':'🔄 Ricalcola'}</button>
        </div>
      </div>
      <div className="cloud-help" style={{marginBottom:10}}>Formati consigliati: export vendite o giacenze con colonne tipo EAN/ISBN, quantità venduta e/o giacenza. In più puoi scansionare un ISBN/EAN dal telefono: se il volume esiste lo carichi/scarichi, altrimenti l’app prova a recuperare titolo e copertina e a proporne la creazione.</div>
      {winMsg&&<div className="cloud-help" style={{marginBottom:10}}>{winMsg}</div>}
      <div className="cloud-help" style={{marginBottom:10,display:'flex',gap:12,flexWrap:'wrap'}}>
        <span><strong>Oggi:</strong> {salesStats.s1}</span>
        <span><strong>7 giorni:</strong> {salesStats.s7}</span>
        <span><strong>30 giorni:</strong> {salesStats.s30}</span>
        <span><strong>Sotto soglia:</strong> {salesStats.low}</span>
        <span><strong>Ultimo evento:</strong> {salesStats.last||'—'}</span>
      </div>
      <div className="hot-refresh">
        <h2 style={{fontSize:16,color:'var(--hot)'}}>🔥 HOT - segnali operativi condivisi</h2>
      </div>
      {hotLoading&&!hotData?.length?<div className="hot-loading"><div className="hot-spinner"></div><p style={{marginTop:8}}>Ricalcolo i segnali del negozio...</p></div>:
        hotData&&hotData.length?hotData.map((item,i)=>(
          <div key={i} className="hot-card">
            <h4><span className={`hot-tag ${item.tag}`}>{item.tag==='new'?'SEGN.' : item.tag==='trend'?'TREND':'🔥 HOT'}</span>{item.title}</h4>
            <p>{item.text}</p>
          </div>
        )):<div className="emp">Ancora nessun segnale operativo disponibile.</div>}
    </>
  );

  return(
    <div className="app">
      <div className="hdr">
        <h1>漫画 Manga Tracker</h1>
        <span className="pill">✓ {ts||'—'}</span>
        <button className={`btn bs ${cloudEnabled?'bb':'bg'}`} onClick={()=>{setCloudDraft(cloudCfg);setShowCloud(true)}}>☁ Cloud</button>
        <button className={`btn bs ${session?'bgrn':'ba'}`} onClick={()=>setShowAuth(true)}>{session?'👤 '+(session.user?.email||'Utente'):'🔐 Accedi'}</button>
        <div className="sts">
          <div className="st"><div className="n b">{stats.t}</div>Titoli</div>
          <div className="st"><div className="n g">{stats.ow}</div>Vol.</div>
          <div className="st"><div className="n r">{stats.mi}</div>Manc.</div>
        </div>
      </div>

      <div className={`cloud-banner ${cloudInfo.tone||'muted'}`}>
        <div>
          <strong><span className={`cloud-status-dot ${cloudInfo.tone||'muted'}`}></span>{cloudInfo.title}</strong>
          <span>{cloudInfo.text}</span>
        </div>
        <span className="cloud-user">{session?.user?.email|| (cloudEnabled?'Cloud configurato':'Solo locale')}</span>
      </div>

      {tab==='catalog'&&renderCatalog()}
      {tab==='favs'&&renderCatalog()}
      {tab==='missing'&&renderMissing()}
      {tab==='cart'&&renderCart()}
      {tab==='hot'&&renderHot()}

      {popup&&<div className="popup-overlay" onClick={()=>setPopup(null)}>
        <div className="popup" onClick={e=>e.stopPropagation()}>
          <h4>Vol. {popup.vol} — {data.find(d=>d.id===popup.sid)?.n}</h4>
          <div className="popup-btns">
            <button className="btn ba" onClick={popupOrder}>🛒 Aggiungi al carrello ordine</button>
            <button className="btn bgrn" onClick={popupBoth}>🛒 + ✓ Ordina e segna come presente</button>
            <button className="btn bb" onClick={popupMark}>✓ Solo segna come presente</button>
            <button className="btn bg" onClick={()=>setPopup(null)}>Annulla</button>
          </div>
        </div>
      </div>}

      {showScan&&<div className="mo" onClick={()=>setShowScan(false)}><div className="md" onClick={e=>e.stopPropagation()}>
        <h3>Scanner ISBN / EAN avanzato</h3>
        <div className="scan-box">
          <div className="scan-tip">Questa versione usa uno scanner web più compatibile, con fotocamera, scelta della camera e scansione da immagine. Dopo la lettura puoi correggere titolo, serie, volume, editore e prezzo prima di caricare o scaricare.</div>
          <div className="scan-topbar">
            <span className="scan-mode-pill">{scanRunning?'🟢 Scanner attivo':'⚪ Scanner fermo'}</span>
            <button className="btn bb" onClick={startScanner}>{scanRunning?'🔄 Riavvia':'🎥 Avvia fotocamera'}</button>
            <button className="btn bg" onClick={stopScanner}>⏸ Ferma</button>
            <button className="btn ba" onClick={()=>scanFileRef.current?.click()}>🖼 Usa foto</button>
            <input ref={scanFileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleScanFileChange}/>
            <select value={scanCameraId} onChange={e=>setScanCameraId(e.target.value)}>
              <option value="">Camera automatica</option>
              {scanCameras.map(cam=><option key={cam.id} value={cam.id}>{cam.label||`Camera ${cam.id.slice(0,6)}`}</option>)}
            </select>
          </div>
          <div className="scan-grid">
            <div>
              <div id="scan-reader" className="scan-reader"></div>
              <div className="scan-stat" style={{marginTop:8}}>Suggerimento: tieni il volume fermo, riempi il riquadro con il barcode e usa luce uniforme. Se il browser blocca la camera, prova da GitHub Pages in HTTPS.</div>
              <div className="scan-inline" style={{marginTop:10}}>
                <input value={scanCode} onChange={e=>setScanCode(e.target.value)} placeholder="Inserisci ISBN / EAN manualmente" inputMode="numeric" style={{flex:'1 1 220px',background:'var(--bg)',border:'1px solid var(--brd)',color:'var(--txt)',padding:'10px 12px',borderRadius:10,fontSize:14,fontFamily:'inherit'}}/>
                <button className="btn ba" onClick={()=>runBarcodeLookup(scanCode,'manual')} disabled={scanBusy}>{scanBusy?'Cerco…':'Cerca codice'}</button>
              </div>
              {scanMsg&&<div className="cloud-help" style={{marginTop:10}}>{scanMsg}</div>}
            </div>
            <div className="scan-editor">
              {scanResult?<div className="scan-result">
                {coverUrl(scanResult.code,scanResult.book?.img)?<img className="scan-cover" src={coverUrl(scanResult.code,scanResult.book?.img)} alt="cover" onError={e=>{e.currentTarget.style.display='none'}}/>:<div className="scan-cover-ph">📚</div>}
                <div className="scan-meta">
                  <div>
                    {scanResult.match?<span className="scan-pill ok">GIÀ IN DATABASE</span>:<span className="scan-pill info">NUOVO CODICE</span>}
                    {!scanResult.match&&scanResult.book?.title?<span className="scan-pill warn">LOOKUP ONLINE</span>:null}
                    <span className="scan-pill info">{scanResult.source==='image'?'DA FOTO':scanResult.source==='camera'?'DA CAMERA':'MANUALE'}</span>
                  </div>
                  <h4>{scanEditor.title||scanResult.book?.title||scanResult.match?.title||'Codice rilevato'}</h4>
                  <div className="scan-code">{scanResult.code}</div>
                </div>
              </div>:<div className="cloud-help">Appena rilevo un codice qui compariranno titolo, copertina e i pulsanti operativi.</div>}
              <div className="fd"><label>Titolo</label><input value={scanEditor.title} onChange={e=>setScanEditor(s=>({...s,title:e.target.value}))} placeholder="Titolo completo"/></div>
              <div className="fd"><label>Serie</label><input value={scanEditor.seriesName} onChange={e=>setScanEditor(s=>({...s,seriesName:e.target.value}))} placeholder="Nome serie / collana"/></div>
              <div className="scan-inline">
                <div className="fd" style={{flex:'1 1 120px'}}><label>Volume</label><input value={scanEditor.volume} onChange={e=>setScanEditor(s=>({...s,volume:e.target.value}))} inputMode="numeric" placeholder="es. 12"/></div>
                <div className="fd" style={{flex:'1 1 140px'}}><label>Prezzo €</label><input value={scanEditor.price} onChange={e=>setScanEditor(s=>({...s,price:e.target.value}))} inputMode="decimal" placeholder="es. 6,50"/></div>
                <div className="fd" style={{flex:'1 1 120px'}}><label>Quantità</label><input value={scanQty} onChange={e=>setScanQty(Math.max(1,parseInt(e.target.value)||1))} inputMode="numeric"/></div>
              </div>
              <div className="fd"><label>Editore</label><input value={scanEditor.publisher} onChange={e=>setScanEditor(s=>({...s,publisher:e.target.value}))} placeholder="Editore"/></div>
              <div className="scan-editor-cta">
                <button className="btn bgrn" onClick={()=>applyScanDelta('load')} disabled={!scanResult}>📥 Carica +{scanQty}</button>
                <button className="btn bg" onClick={()=>applyScanDelta('unload')} disabled={!scanResult||!scanResult.match}>📤 Scarica -{scanQty}</button>
                <button className="btn bb" onClick={()=>{setScanCode('');setScanResult(null);setScanMsg('');startScanner()}}>🔄 Nuova scansione</button>
              </div>
              <div>
                <div className="scan-mini-actions" style={{justifyContent:'space-between',marginBottom:8}}>
                  <strong style={{fontSize:13}}>Scansioni recenti</strong>
                  {!!scanHistory.length&&<button className="btn bg bs" onClick={()=>setScanHistory([])}>Svuota</button>}
                </div>
                <div className="scan-history">
                  {scanHistory.length?scanHistory.slice(0,8).map(item=><div key={item.id} className="scan-history-item">
                    <div><strong>{item.title||item.code}</strong><div className="mini">{item.code} · {item.action} {item.qty?`· x${item.qty}`:''}</div></div>
                    <div className="mini">{new Date(item.at).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}</div>
                  </div>):<div className="cloud-help">Nessuna scansione recente su questo dispositivo.</div>}
                </div>
              </div>
            </div>
          </div>
          <div className="mb" style={{flexWrap:'wrap'}}>
            <button className="btn bg" onClick={()=>setShowScan(false)}>Chiudi</button>
          </div>
        </div>
      </div></div>}

      {showAdd&&<div className="mo" onClick={()=>setShowAdd(false)}><div className="md" onClick={e=>e.stopPropagation()}>
        <h3>Aggiungi serie</h3>
        <AddForm onAdd={addS} onClose={()=>setShowAdd(false)}/>
      </div></div>}

      {showCloud&&<div className="mo" onClick={()=>setShowCloud(false)}><div className="md" onClick={e=>e.stopPropagation()}>
        <h3>Cloud condiviso · Supabase</h3>
        <div className="cloud-help">Questa configurazione trasforma l’app da archivio locale a memoria condivisa reale. Dopo l’accesso, ogni modifica viene salvata nel database comune e propagata a tutti gli utenti autorizzati.</div>
        <div className="fd"><label>Supabase URL</label><input value={cloudDraft.url} onChange={e=>setCloudDraft(d=>({...d,url:e.target.value}))} placeholder="https://xxxx.supabase.co"/></div>
        <div className="fd"><label>Publishable / anon key</label><input type="password" value={cloudDraft.key} onChange={e=>setCloudDraft(d=>({...d,key:e.target.value}))} placeholder="sb_publishable_... oppure anon key"/></div>
        <label className="cloud-check"><input type="checkbox" checked={!!cloudDraft.allowSignup} onChange={e=>setCloudDraft(d=>({...d,allowSignup:e.target.checked}))}/>Mostra anche il pulsante Registrati nell’app</label>
        <div className="auth-note">Prima di usare il cloud, esegui lo schema SQL di base in Supabase SQL Editor e abilita almeno l’email/password in Authentication. Se vuoi che possano entrare solo utenti invitati da te, lascia disattivato “Registrati”.</div>
        <div className="cloud-help">Se compare <span className="cloud-kbd">Failed to fetch</span>, nella pratica è quasi sempre uno di questi casi: URL progetto errato, progetto Supabase in pausa, rete del telefono che blocca <span className="cloud-kbd">*.supabase.co</span>, oppure chiave sbagliata.</div>
        <div className="cloud-sql">{SUPABASE_SQL}</div>
        <div className="mb" style={{flexWrap:'wrap'}}>
          <button className="btn bb" onClick={copySetupSQL}>Copia SQL base</button>
          <button className="btn ba" onClick={saveCloudSettings}>Salva configurazione</button>
          <button className="btn bg" onClick={clearCloudSettings}>Rimuovi config</button>
          <button className="btn bg" onClick={()=>setShowCloud(false)}>Chiudi</button>
        </div>
      </div></div>}

      {showAuth&&<div className="mo" onClick={()=>setShowAuth(false)}><div className="md" onClick={e=>e.stopPropagation()}>
        <h3>{session?'Utente connesso':'Accesso cloud'}</h3>
        {session?<>
          <div className="cloud-help">Sei autenticato come <strong>{session.user?.email}</strong>. Da qui in poi il database centrale è la fonte ufficiale dello stato dell’app.</div>
          <div className="mb" style={{flexWrap:'wrap'}}>
            <button className="btn bb" onClick={loadRemote}>Ricarica dal cloud</button>
            <button className="btn bg" onClick={handleLogout}>Esci</button>
            <button className="btn bg" onClick={()=>setShowAuth(false)}>Chiudi</button>
          </div>
        </>:<>
          <div className="fd"><label>Email</label><input type="email" value={authForm.email} onChange={e=>setAuthForm(f=>({...f,email:e.target.value}))} placeholder="nome@dominio.it"/></div>
          <div className="fd"><label>Password</label><input type="password" value={authForm.password} onChange={e=>setAuthForm(f=>({...f,password:e.target.value}))} placeholder="Password"/></div>
          {authMsg&&<div className="cloud-help" style={{marginBottom:8}}>{authMsg}</div>}
          <div className="mb" style={{flexWrap:'wrap'}}>
            <button className="btn ba" onClick={()=>handleAuthSubmit('signin')}>Accedi</button>
            {cloudCfg.allowSignup&&<button className="btn bb" onClick={()=>handleAuthSubmit('signup')}>Registrati</button>}
            <button className="btn bg" onClick={()=>setShowAuth(false)}>Chiudi</button>
          </div>
          <div className="auth-note">Se preferisci bloccare registrazioni libere, crea gli utenti dal dashboard Supabase e lascia disattivato il pulsante Registrati.</div>
        </>}
      </div></div>}

      <nav className="bnav">
        <button className={tab==='catalog'?'on':''} onClick={()=>setTab('catalog')}><span className="ico">📚</span>Catalogo</button>
        <button className={tab==='favs'?'on':''} onClick={()=>setTab('favs')}><span className="ico">⭐</span>Preferiti{favs.length>0&&<span className="badge-n">{favs.length}</span>}</button>
        <button className={tab==='missing'?'on':''} onClick={()=>setTab('missing')}><span className="ico">📋</span>Mancanti</button>
        <button className={tab==='cart'?'on':''} onClick={()=>setTab('cart')}><span className="ico">🛒</span>Carrello{cart.length>0&&<span className="badge-n">{cart.length}</span>}</button>
        <button className={tab==='hot'?'on':''} onClick={()=>setTab('hot')}><span className="ico">🔥</span>Hot</button>
      </nav>
    </div>);
}

function AddForm({onAdd,onClose}){
  const[n,sN]=useState('');const[e,sE]=useState('');const[iS,sIS]=useState(true);
  const[tv,sTV]=useState(1);const[ow,sOW]=useState('');const[pr,sPR]=useState(5.9);
  function go(){if(!n.trim())return;const h=ow.split(/[,;\s]+/).map(Number).filter(x=>x>0).sort((a,b)=>a-b);
    onAdd({n:n.toUpperCase(),e:e.toUpperCase()||'N/A',h:iS?h:[],mx:iS?(parseInt(tv)||1):0,tu:iS?(parseInt(tv)||1):0,ut:iS?(parseInt(tv)||1):0,p:parseFloat(pr)||0,tp:iS?h.length:1,s:iS,st:iS?[]:[{t:n.toUpperCase(),g:1,p:parseFloat(pr)||0}]})}
  return(<>
    <div className="fd"><label>Nome</label><input value={n} onChange={e=>sN(e.target.value)} placeholder="es. KAGURABACHI"/></div>
    <div className="fd"><label>Editore</label><input value={e} onChange={e=>sE(e.target.value)} placeholder="es. STAR COMICS"/></div>
    <div className="fd"><label>Tipo</label><select value={iS?'s':'t'} onChange={e=>sIS(e.target.value==='s')}><option value="s">Serie</option><option value="t">Singolo</option></select></div>
    {iS&&<><div className="fd"><label>Tot. usciti</label><input type="number" value={tv} onChange={e=>sTV(e.target.value)} min={1} inputMode="numeric"/></div>
    <div className="fd"><label>Posseduti (virgola)</label><input value={ow} onChange={e=>sOW(e.target.value)} placeholder="1,2,3,5,7" inputMode="numeric"/></div></>}
    <div className="fd"><label>Prezzo €</label><input type="number" value={pr} onChange={e=>sPR(e.target.value)} step={0.1} inputMode="decimal"/></div>
    <div className="mb"><button className="btn ba" onClick={go}>Aggiungi</button><button className="btn bg" onClick={onClose}>Annulla</button></div>
  </>)
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
